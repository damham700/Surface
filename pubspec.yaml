name: surface
description: Netflix & Disney+ streaming with Bank of Khartoum payment integration.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0

  # Navigation & Routing
  go_router: ^10.0.0

  # API & Networking
  dio: ^5.3.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Authentication
  flutter_secure_storage: ^9.0.0

  # UI & Design
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.6.0

  # Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  flutter_local_notifications: ^16.2.0

  # Localization
  intl: ^0.19.0

  # Date & Time
  jiffy: ^6.1.0

  # Payment & Banking
  webview_flutter: ^4.4.0
  url_launcher: ^6.1.0

  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  package_info_plus: ^4.1.0
  logger: ^2.1.0
  equatable: ^2.0.5

  # Camera & File Handling
  image_picker: ^1.0.0
  permission_handler: ^11.4.0

  # Chat & Support
  socket_io_client: ^2.0.1

  # Analytics
  firebase_analytics: ^10.7.0

  # PDF & Document Handling
  pdf: ^3.10.0
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
